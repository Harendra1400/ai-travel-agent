name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_DB: travel_agent_test
          POSTGRES_USER: travel_agent
          POSTGRES_PASSWORD: integration-only
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U travel_agent -d travel_agent_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: apps/backend
    env:
      TRAVEL_AGENT_ENVIRONMENT: test
      TRAVEL_AGENT_DATABASE_URL: postgresql+psycopg://travel_agent:integration-only@localhost:5432/travel_agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.31"
          enable-cache: true
      - run: uv sync --frozen --all-groups
      - run: uv run black --check src tests migrations
      - run: uv run ruff check src tests migrations
      - run: uv run mypy src tests
      - run: uv run pytest
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run alembic downgrade base
      - run: uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    env:
      AUTH_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      matrix:
        include:
          - context: apps/backend
            image: travel-agent-backend
          - context: apps/frontend
            image: travel-agent-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.31"
          enable-cache: true
      - run: uv export --frozen --no-dev --format requirements-txt --output-file requirements-audit.txt
        working-directory: apps/backend
      - run: uvx pip-audit -r requirements-audit.txt
        working-directory: apps/backend
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/frontend
      - run: pnpm audit --prod --audit-level high
        working-directory: apps/frontend
      - uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
