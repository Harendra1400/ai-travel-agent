name: ai-travel-agent

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_agent}
      POSTGRES_USER: ${POSTGRES_USER:-travel_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-travel_agent} -d ${POSTGRES_DB:-travel_agent}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:8.8.0-alpine3.23
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD}",
      ]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:?Set REDIS_PASSWORD} ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  database-init:
    build:
      context: ./apps/backend
    command: [".venv/bin/python", "-m", "app.db.bootstrap"]
    environment: &backend-environment
      TRAVEL_AGENT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-travel_agent}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-travel_agent}
      TRAVEL_AGENT_REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379/0
      TRAVEL_AGENT_QDRANT_URL: http://qdrant:6333
      TRAVEL_AGENT_AUTH_DISABLED: "true"
      TRAVEL_AGENT_OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./apps/backend
    environment: *backend-environment
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./apps/backend
    command: [".venv/bin/python", "-m", "app.worker"]
    environment: *backend-environment
    depends_on:
      database-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
    environment:
      BACKEND_URL: http://backend:8000
      AUTH_DISABLED: "true"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
